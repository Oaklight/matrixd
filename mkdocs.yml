site_name: matrixd
site_description: Matrix agent daemon — listener, tools, and hooks for AI agents
site_author: Peng Ding
site_url: https://matrixd.readthedocs.io/en/latest
repo_name: Oaklight/matrixd
repo_url: https://github.com/Oaklight/matrixd
copyright: Copyright &copy; 2026 Peng Ding

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            members_order: source
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Home:
          - index.md
        Usage:
          - usage/index.md
          - usage/installation.md
          - usage/configuration.md
          - usage/listener.md
        API Reference:
          - api/index.md
        Examples:
          - examples/index.md
        Changelog:
          - changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/matrixd
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/matrixd/
  alternate:
    - name: English
      link: /en/latest/
      lang: en
    - name: 中文
      link: /zh-cn/latest/
      lang: zh

nav:
  - Home: index.md
  - Usage:
      - usage/index.md
      - Installation: usage/installation.md
      - Configuration: usage/configuration.md
      - Listener: usage/listener.md
  - API Reference:
      - api/index.md
  - Examples:
      - examples/index.md
  - Changelog: changelog.md
