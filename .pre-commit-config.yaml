repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^src/matrixd/_vendor/
      - id: ruff-format
        exclude: ^src/matrixd/_vendor/

  - repo: https://github.com/rohaquinlop/complexipy-pre-commit
    rev: v5.1.0
    hooks:
      - id: complexipy
        files: ^.*\.py$
        exclude: ^src/matrixd/_vendor/
        args: [-mx, "45"]
